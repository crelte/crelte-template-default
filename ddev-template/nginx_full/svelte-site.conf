server {
    listen 80;
    listen 443 ssl;

    # Update this if you want to change the project's front-end URL:
    server_name CRELTE_PROJECT_HOST;

    # Proxy everything to the vite dev server (crelte) running
    # inside the web container, started with `ddev sv npm run dev`
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        # X-Forwarded-Proto is already set by the ddev router (traefik)
        # which terminates tls, so it is passed through unchanged and
        # crelte uses it to detect the request protocol
        proxy_cache_bypass $http_upgrade;
    }

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
