server {
    listen 80;
    listen 443 ssl;

    # Update this if you want to change the project's front-end URL:
    server_name CRELTE_PROJECT_HOST;

    # Proxy everything to the vite dev server (crelte) running
    # inside the web container, started with `ddev sv npm run dev`
    location / {
        # vite serves https itself with the ddev certificate, but the
        # certificate is not valid for localhost so don't verify it
        proxy_pass https://localhost:8080;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
